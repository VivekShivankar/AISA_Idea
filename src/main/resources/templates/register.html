<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AISA_Idea — Register</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body style="overflow:auto;">
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">⛽</div>
      <span class="auth-logo-text">AISA_<em>Idea</em></span>
    </div>
    <h2 class="auth-title">Create Account 🎉</h2>
    <p class="auth-sub">Join AISA_Idea — your smart bike AI platform</p>

    <div th:if="${error}" class="auth-alert err" th:text="${error}"></div>
    <div th:if="${msg}"   class="auth-alert ok"  th:text="${msg}"></div>

    <form th:action="@{/register}" method="post">
      <div class="auth-group">
        <label>Full Name</label>
        <input type="text" name="fullName" placeholder="e.g. Rahul Sharma" required/>
      </div>
      <div class="auth-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a unique username" required/>
      </div>
      <div class="auth-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="your@email.com" required/>
      </div>
      <div class="auth-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min 6 characters" required minlength="6"/>
      </div>
      <button type="submit" class="auth-btn">✨ Create My Account</button>
    </form>

    <div class="auth-link">Already have an account? <a th:href="@{/login}">Sign in →</a></div>
  </div>
</div>
</body>
</html>
